<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漫画文件夹管理</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --border:#e3e6ea; --text:#1f2329;
    --muted:#8a9099; --accent:#3b5bdb; --accent-soft:#e7edff;
    --danger:#e03131; --danger-soft:#fff0f0; --ok:#2f9e44;
    --bar-0:#3b5bdb; --bar-1:#7048e8; --bar-2:#e8590c; --bar-3:#e03131;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",
      "Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px; margin:0 auto; padding:24px 20px 80px;}
  header{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap; margin-bottom:18px;
  }
  h1{font-size:22px; margin:0; display:flex; align-items:center; gap:10px;}
  h1 .badge{font-size:12px; font-weight:600; color:var(--muted);
    background:var(--card); border:1px solid var(--border); padding:3px 8px;
    border-radius:999px;}
  .toolbar{display:flex; align-items:center; gap:12px;}
  .summary{font-size:13px; color:var(--muted);}
  .summary b{color:var(--text);}
  button{
    cursor:pointer; font-size:14px; border-radius:8px; padding:8px 16px;
    border:1px solid var(--border); background:var(--card); color:var(--text);
    transition:.15s; font-weight:500;
  }
  button:hover{border-color:var(--accent); color:var(--accent);}
  button:active{transform:translateY(1px);}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  button.primary:hover{background:#3248c0;}
  button.danger{background:var(--danger); color:#fff; border-color:var(--danger);}
  button.danger:hover{background:#c92525;}
  button[disabled]{opacity:.5; cursor:not-allowed;}

  .banner{
    border-radius:10px; padding:12px 16px; margin-bottom:16px; font-size:14px;
    display:flex; align-items:center; gap:10px;
  }
  .banner.err{background:var(--danger-soft); border:1px solid #ffd0d0; color:var(--danger);}
  .banner.info{background:var(--accent-soft); border:1px solid #c8d6ff; color:#3248c0;}
  .banner .x{margin-left:auto; cursor:pointer; opacity:.6;}
  .banner .x:hover{opacity:1;}

  .card{background:var(--card); border:1px solid var(--border); border-radius:12px;
    overflow:hidden;}
  .list-head, .row{
    display:grid; grid-template-columns:32px 1fr 100px 70px; gap:10px; align-items:center;
    padding:10px 16px;
  }
  .list-head{
    font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;
    border-bottom:1px solid var(--border); background:#fafbfc;
  }
  .row{border-bottom:1px solid #f0f1f3; transition:background .12s;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:#fafbff;}
  .row .name{min-width:0;}
  .name .nm{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis;}
  .bar-wrap{margin-top:6px; height:8px; background:#eef0f3; border-radius:6px; overflow:hidden;}
  .bar{height:100%; border-radius:6px; transition:width .5s cubic-bezier(.2,.8,.2,1);}
  .size{font-variant-numeric:tabular-nums; font-weight:600; text-align:right; font-size:14px;}
  .cb{display:flex; align-items:center; justify-content:center;}
  .cb input[type=checkbox]{width:16px; height:16px; cursor:pointer; accent-color:var(--accent);}
  .sel-bar{display:flex; align-items:center; gap:12px; padding:8px 16px; background:var(--accent-soft);
    border-bottom:1px solid var(--border); font-size:13px;}
  .sel-bar .count b{color:var(--accent);}
  .del{justify-self:end;}
  .del button{padding:6px 12px; font-size:13px; color:var(--danger); border-color:#f0d0d0;}
  .del button:hover{background:var(--danger-soft); border-color:var(--danger);}

  .empty{padding:50px 20px; text-align:center; color:var(--muted);}
  .empty .big{font-size:40px; margin-bottom:8px;}

  .loading{padding:40px; text-align:center; color:var(--muted);}
  .spinner{width:26px; height:26px; border:3px solid var(--border); border-top-color:var(--accent);
    border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* modal */
  .modal-mask{position:fixed; inset:0; background:rgba(15,18,22,.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal-mask.hide{display:none;}
  .modal{background:#fff; border-radius:14px; padding:24px; max-width:420px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 10px; font-size:17px;}
  .modal p{margin:0 0 6px; font-size:14px; color:var(--muted);}
  .modal .target{font-weight:700; color:var(--text); word-break:break-all;}
  .modal .warn{color:var(--danger); font-size:13px; margin-top:10px;}
  .modal .actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#1f2329; color:#fff; padding:10px 18px; border-radius:8px; font-size:13px;
    opacity:0; transition:.25s; pointer-events:none; z-index:60;}
  .toast.show{opacity:.95;}
  .toast.ok{background:#2f9e44;}
  .toast.err{background:var(--danger);}

  /* 饼图 */
  .chart-wrap{display:flex; flex-direction:column; align-items:center; padding:24px 16px 20px; gap:20px;}
  .chart-wrap canvas{max-width:100%; height:auto;}
  .legend{display:flex; flex-wrap:wrap; gap:8px 16px; justify-content:center; width:100%; max-width:600px;}
  .legend-item{display:flex; align-items:center; gap:6px; font-size:13px; line-height:1.4;}
  .legend-item .dot{width:12px; height:12px; border-radius:3px; flex-shrink:0;}
  .legend-item .pct{color:var(--muted); margin-left:2px;}

  @media(max-width:640px){
    .list-head{display:none;}
    .row{grid-template-columns:32px 1fr 70px 60px; gap:6px; padding:10px 12px;}
    .size{font-size:12px;}
    .del button{width:100%; padding:6px 8px; font-size:12px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Komiku <span class="badge" id="dirBadge">/vol1/1000/Manga</span></h1>
    <div class="toolbar">
      <span class="summary" id="summary"></span>
      <button id="refresh" class="primary">↻ 刷新</button>
      <button id="viewToggle" class="">饼图</button>
    </div>
  </header>

  <div id="banner" class="banner info hide" style="display:none">
    <span id="bannerMsg"></span>
    <span class="x" onclick="hideBanner()">✕</span>
  </div>

  <div class="card">
    <div class="list-head">
      <span class="cb"><input type="checkbox" id="selectAll"></span>
      <span>文件夹</span>
      <span style="text-align:right">大小</span>
      <span style="text-align:right">操作</span>
    </div>
    <div id="selBar" class="sel-bar" style="display:none">
      <span class="count">已选 <b id="selCount">0</b> 个</span>
      <button id="clearSel">取消</button>
      <button id="delSelected" class="danger">删除选中</button>
    </div>
    <div id="body">
      <div class="loading"><div class="spinner"></div>扫描中…</div>
    </div>
    <div id="chartWrap" class="chart-wrap" style="display:none">
      <canvas id="pieChart" width="500" height="500"></canvas>
      <div id="legend" class="legend"></div>
    </div>
  </div>
</div>

<!-- 确认删除 modal（单个） -->
<div class="modal-mask hide" id="modal">
  <div class="modal">
    <h3>⚠️ 确认删除</h3>
    <p>即将删除文件夹：</p>
    <p class="target" id="modalName"></p>
    <p>大小：<b id="modalSize"></b></p>
    <p class="warn">此操作将永久删除该文件夹及其全部内容，不可恢复！</p>
    <div class="actions">
      <button onclick="closeModal()">取消</button>
      <button class="danger" id="confirmDel">确认删除</button>
    </div>
  </div>
</div>

<!-- 批量删除确认弹窗 -->
<div class="modal-mask hide" id="modalBatch">
  <div class="modal">
    <h3>⚠️ 批量删除</h3>
    <p>即将删除 <b id="batchCount"></b> 个文件夹：</p>
    <p class="target" id="batchNames" style="max-height:120px;overflow-y:auto"></p>
    <p class="warn">此操作将永久删除以上文件夹及其全部内容，不可恢复！</p>
    <div class="actions">
      <button onclick="closeModalBatch()">取消</button>
      <button class="danger" id="confirmBatchDel">确认删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let DATA = [];
let selected = new Set();
let pendingDelete = null;
let viewMode = 'list'; // 'list' | 'pie'

function fmt(bytes){
  const u=['B','KB','MB','GB','TB']; let i=0, v=bytes;
  while(v>=1024 && i<u.length-1){v/=1024; i++;}
  const d = v<10 && i>0 ? 2 : (v<100 ? 1 : 0);
  return v.toFixed(d)+' '+u[i];
}
function fmtGB(bytes){
  const gb = bytes / 1073741824;
  return gb.toFixed(gb < 10 ? 2 : (gb < 100 ? 1 : 0)) + ' GB';
}
function barColor(ratio){
  if(ratio>0.66) return 'var(--bar-3)';
  if(ratio>0.33) return 'var(--bar-2)';
  if(ratio>0.10) return 'var(--bar-1)';
  return 'var(--bar-0)';
}

const PIE_COLORS = ['#3b5bdb','#2f9e44','#e8590c','#7048e8','#0c8599',
                    '#e03131','#f08c00','#cc5de8','#20c997','#f06595',
                    '#495057','#1098ad','#a61e24','#5c940d','#d6336c'];

function switchView(mode){
  viewMode = mode;
  const body = $('body');
  const wrap = $('chartWrap');
  const btn = $('viewToggle');
  if(mode === 'pie'){
    body.style.display = 'none';
    wrap.style.display = 'flex';
    btn.textContent = '条形图';
    drawPie();
  }else{
    body.style.display = '';
    wrap.style.display = 'none';
    btn.textContent = '饼图';
    render();
  }
}

function drawPie(){
  const canvas = $('pieChart');
  const wrap = $('chartWrap');
  const ctx = canvas.getContext('2d');
  const legend = $('legend');

  const containerW = wrap.clientWidth || 600;
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(containerW - 32, 600);
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  const W = size, H = size;
  ctx.clearRect(0,0,W,H);

  if(!DATA.length){
    legend.innerHTML = '<span style="color:var(--muted)">无数据</span>';
    return;
  }

  const total = DATA.reduce((s,f)=>s+f.size_bytes, 0);
  const cx = W/2, cy = 220;
  const radius = Math.min(cx, cy) - 60;

  // 按大小分成主要(>=3%)和次要(<3%)
  const PIE_MIN = 0.03;
  const major = DATA.filter(f => f.size_bytes / total >= PIE_MIN);
  const other = DATA.filter(f => f.size_bytes / total < PIE_MIN);

  let start = -Math.PI/2;
  const slices = [];

  major.forEach((f,i)=>{
    const pct = f.size_bytes / total;
    const angle = pct * 2 * Math.PI;
    slices.push({name:f.name, size:f.size_bytes, pct, start, end:start+angle, color:PIE_COLORS[i % PIE_COLORS.length]});
    start += angle;
  });

  if(other.length){
    const otherBytes = other.reduce((s,f)=>s+f.size_bytes, 0);
    const pct = otherBytes / total;
    const angle = pct * 2 * Math.PI;
    if(angle > 0.005){
      slices.push({name:`其他(${other.length}个)`, size:otherBytes, pct, start, end:start+angle, color:'#adb5bd', isOther:true});
    }
  }

  // 画扇区
  slices.forEach(s=>{
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, s.start, s.end);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 引线 + 标签
  ctx.font = '13px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textBaseline = 'middle';
  const labelR = radius + 16;

  slices.forEach(s=>{
    if(s.pct < PIE_MIN || s.isOther) return;
    const mid = s.start + (s.end - s.start)/2;
    const lx = cx + Math.cos(mid) * labelR;
    const ly = cy + Math.sin(mid) * labelR;
    const outerX = cx + Math.cos(mid) * (radius + 10);
    const outerY = cy + Math.sin(mid) * (radius + 10);

    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(mid) * radius, cy + Math.sin(mid) * radius);
    ctx.lineTo(outerX, outerY);
    const extendX = lx + (mid > -Math.PI/2 && mid < Math.PI/2 ? 20 : -20);
    ctx.lineTo(extendX, ly);
    ctx.strokeStyle = '#868e96';
    ctx.lineWidth = 1;
    ctx.stroke();

    const pctStr = (s.pct*100).toFixed(1) + '%';
    const label = s.name.length > 12 ? s.name.slice(0,11)+'…' : s.name;
    ctx.fillStyle = '#1f2329';
    ctx.textAlign = mid > -Math.PI/2 && mid < Math.PI/2 ? 'left' : 'right';
    ctx.fillText(label + ' ' + pctStr, extendX + (mid > -Math.PI/2 && mid < Math.PI/2 ? 6 : -6), ly);
  });

  // 图例
  legend.innerHTML = slices.map(s=>{
    const pctStr = (s.pct*100).toFixed(1)+'%';
    return `<div class="legend-item"><span class="dot" style="background:${s.color}"></span>${esc(s.name)} <span class="pct">${fmtGB(s.size)} (${pctStr})</span></div>`;
  }).join('');
}

function render(){
  const body = $('body');
  if(!DATA.length){
    body.innerHTML = '<div class="empty"><div class="big">📂</div>没有子文件夹</div>';
    updateSelUI();
    return;
  }
  const max = DATA[0].size_bytes || 1;
  body.innerHTML = DATA.map(f=>{
    const ratio = f.size_bytes / max;
    const chk = selected.has(f.name) ? 'checked' : '';
    return `
    <div class="row">
      <span class="cb"><input type="checkbox" data-name="${escAttr(f.name)}" ${chk}></span>
      <div class="name">
        <div class="nm" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="bar-wrap"><div class="bar" style="width:${(ratio*100).toFixed(1)}%;background:${barColor(ratio)}"></div></div>
      </div>
      <div class="size">${fmtGB(f.size_bytes)}</div>
      <div class="del"><button onclick="askDelete('${escAttr(f.name)}')">删</button></div>
    </div>`;
  }).join('');
  // 绑定行级 checkbox
  body.querySelectorAll('.row input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      if(cb.checked) selected.add(cb.dataset.name);
      else selected.delete(cb.dataset.name);
      updateSelUI();
    });
  });
  updateSelUI();
}

function renderSummary(meta){
  $('dirBadge').textContent = meta.dir;
  $('summary').innerHTML = `共 <b>${meta.count}</b> 个 · 总计 <b>${fmtGB(meta.total_bytes)}</b>`
    + (meta.mock ? ' · <span style="color:var(--bar-2)">模拟数据</span>' : '');
}

function updateSelUI(){
  const bar = $('selBar');
  const cnt = selected.size;
  bar.style.display = cnt ? 'flex' : 'none';
  $('selCount').textContent = cnt;
  // 同步全选框
  const cbs = document.querySelectorAll('#body .row input[type=checkbox]');
  const checked = document.querySelectorAll('#body .row input[type=checkbox]:checked');
  const all = $('selectAll');
  if(all){
    all.checked = cbs.length > 0 && checked.length === cbs.length;
    all.indeterminate = checked.length > 0 && checked.length < cbs.length;
  }
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escAttr(s){return esc(s).replace(/'/g,'&#39;');}

async function load(){
  $('body').innerHTML = '<div class="loading"><div class="spinner"></div>扫描中…</div>';
  try{
    const r = await fetch('/api/folders', {cache:'no-store'});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error || '扫描失败');
    DATA = j.folders || [];
    renderSummary(j);
    if(viewMode === 'pie') switchView('pie'); else render();
    if(j.mock) showBanner('info', '当前为 MOCK 模拟数据模式（未连接真实 NAS 目录）。');
  }catch(e){
    $('body').innerHTML = '';
    showBanner('err', '加载失败：' + e.message);
    toast('加载失败', 'err');
  }
}

function showBanner(type, msg){
  const b = $('banner');
  b.className = 'banner ' + type;
  b.style.display = 'flex';
  $('bannerMsg').textContent = msg;
}
function hideBanner(){ $('banner').style.display = 'none'; }

function toast(msg, type){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{t.className='toast'}, 2200);
}

function askDelete(name){
  const f = DATA.find(x=>x.name===name);
  if(!f) return;
  pendingDelete = name;
  $('modalName').textContent = name;
  $('modalSize').textContent = fmt(f.size_bytes);
  $('modal').classList.remove('hide');
}
function closeModal(){ $('modal').classList.add('hide'); pendingDelete=null; }

async function doDelete(){
  if(!pendingDelete) return;
  const name = pendingDelete;
  $('confirmDel').disabled = true;
  $('confirmDel').textContent = '删除中…';
  try{
    const r = await fetch('/api/delete',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    });
    const j = await r.json();
    if(!j.ok) throw new Error(j.error || '删除失败');
    DATA = DATA.filter(x=>x.name!==name);
    if(viewMode === 'pie') drawPie(); else render();
    closeModal();
    toast('已删除：' + name, 'ok');
  }catch(e){
    showBanner('err', '删除失败：' + e.message);
    toast('删除失败', 'err');
  }finally{
    $('confirmDel').disabled = false;
    $('confirmDel').textContent = '确认删除';
  }
}

$('refresh').addEventListener('click', load);
$('viewToggle').addEventListener('click', ()=>{
  switchView(viewMode === 'list' ? 'pie' : 'list');
});
$('selectAll').addEventListener('change', ()=>{
  const checked = $('selectAll').checked;
  document.querySelectorAll('#body .row input[type=checkbox]').forEach(cb=>{
    cb.checked = checked;
    if(checked) selected.add(cb.dataset.name);
    else selected.delete(cb.dataset.name);
  });
  updateSelUI();
});
$('clearSel').addEventListener('click', ()=>{
  selected.clear();
  document.querySelectorAll('#body .row input[type=checkbox]').forEach(cb=>{cb.checked=false});
  updateSelUI();
});
$('delSelected').addEventListener('click', ()=>{
  const names = [...selected];
  if(!names.length) return;
  $('batchCount').textContent = names.length;
  $('batchNames').textContent = names.join('、');
  $('modalBatch').classList.remove('hide');
});
$('confirmBatchDel').addEventListener('click', doBatchDelete);
$('confirmDel').addEventListener('click', doDelete);
$('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
$('modalBatch').addEventListener('click', e=>{ if(e.target.id==='modalBatch') closeModalBatch(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); closeModalBatch(); } });

async function doBatchDelete(){
  const names = [...selected];
  if(!names.length) return;
  const btn = $('confirmBatchDel');
  btn.disabled = true;
  btn.textContent = '删除中…';
  let ok=0, fail=0;
  for(let i=0;i<names.length;i++){
    try{
      const r = await fetch('/api/delete',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name:names[i]})
      });
      const j = await r.json();
      if(j.ok){ ok++; DATA = DATA.filter(x=>x.name!==names[i]); }
      else fail++;
    }catch(e){ fail++; }
    btn.textContent = `删除中 ${i+1}/${names.length}`;
  }
  selected.clear();
  btn.disabled = false;
  btn.textContent = '确认删除';
  closeModalBatch();
  if(viewMode === 'pie') drawPie(); else render();
  toast(`完成：成功 ${ok}，失败 ${fail}`, fail ? 'err' : 'ok');
}

function closeModalBatch(){ $('modalBatch').classList.add('hide'); }

load();
</script>
</body>
</html>
