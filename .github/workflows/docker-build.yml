name: Build Docker Offline Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（支持多架构）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: komiku:latest

      - name: 导出离线镜像 tar
        run: docker save komiku:latest | gzip > komiku.tar.gz

      - name: 上传离线镜像包
        uses: actions/upload-artifact@v4
        with:
          name: komiku-offline-image
          path: komiku.tar.gz
          retention-days: 30
          if-no-files-found: error
